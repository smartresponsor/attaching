doctrine:
  dbal:
    driver: 'pdo_sqlite'
    path: '%kernel.project_dir%/var/attachment.sqlite'
  orm:
    auto_generate_proxy_classes: true
    enable_lazy_ghost_objects: true
    mappings:
      App:
        type: attribute
        dir: '%kernel.project_dir%/src/Entity'
        prefix: 'App\\Entity'
        is_bundle: false
