doctrine:
  dbal:
    url: 'sqlite:///%kernel.project_dir%/var/attachment.test.sqlite'
  orm:
    enable_native_lazy_objects: true
    entity_managers:
      default:
        auto_mapping: false
        mappings:
          App:
            type: attribute
            dir: '%kernel.project_dir%/src/Entity'
            prefix: 'App\Entity'
            is_bundle: false
